graphhopper:
  graph.location: /graphhopper/graph-cache
  datareader.file: /data/delhi-ncr-latest.osm.pbf

  # Required by GH 9.1 — omitting it throws IllegalArgumentException at startup.
  # Empty list = import all highway types (car routing is restricted by the
  # car_access encoded value, not by dropping highways at import time).
  import.osm.ignored_highways: []

  # WHY: our CrimeWeighting factory looks up VehicleAccess.key("car") = "car_access"
  # and VehicleSpeed.key("car") = "car_average_speed" from the EncodingManager.
  # Without these two encoded values in the graph, checkProfilesConsistency throws
  # "Cannot find EncodedValue 'car_access'" at startup.
  # Adding them here tells GH to encode them from OSM tags during graph import.
  # Both config-bootstrap.yml and this file must list the same set so the graph
  # built by bootstrap can be loaded by the full config without a fingerprint mismatch.
  graph.encoded_values: car_access, car_average_speed

  profiles:
    # GH 9.x removed the built-in "fastest" weighting name.
    # "custom" with an empty custom_model is equivalent: no speed/priority adjustments
    # means GH uses every road's encoded max speed — i.e., fastest routing.
    # WHY custom_model: {} not custom_model_files: []: an empty files list leaves the
    # CustomModel Java object null; GH's prepareImport NPEs on null. An inline empty
    # object gives a non-null CustomModel with all-default values.
    - name: fastest
      weighting: custom
      custom_model:
        speed:
          - if: "true"
            limit_to: 90

    # WHY weighting: custom (not crime_aware):
    # GH 9.x enforces two mutually exclusive constraints that trap a non-custom weighting:
    #   prepareImport (line 832): calls findVariablesForEncodedValuesString(profile.getCustomModel(), ...)
    #                             for EVERY profile without null-checking — NPEs when custom_model is null.
    #   checkProfilesConsistency (line 1082): throws if custom_model != null AND weighting != custom.
    # Solution: use weighting=custom (satisfies line 1082) + empty custom_model (satisfies line 832).
    # Our patched DefaultWeightingFactory detects the crime_aware.lambda hint inside the custom
    # branch and returns a CrimeWeighting instead of the standard CustomWeighting.
    - name: balanced
      weighting: custom
      crime_aware.lambda: 0.1
      crime_aware.edge_risk_path: /data/edge_risk.json
      custom_model:
        speed: []
        priority: []

    - name: safest
      weighting: custom
      crime_aware.lambda: 0.3
      crime_aware.edge_risk_path: /data/edge_risk.json
      custom_model:
        speed: []
        priority: []

  # WHY empty lists: CH bakes weights into the graph at preprocessing time.
  # CrimeWeighting reads edge_risk.json at startup — if the JSON changes weekly,
  # CH-prepared shortcuts become stale and routing silently gives wrong results.
  # Flexible (non-CH) routing on Delhi's graph (~89K edges) completes in <200ms.
  # WHY profiles_ch/profiles_lm not prepare.ch.weightings: the key was renamed
  # in GH 9.1; prepare.ch.weightings throws IllegalStateException at startup.
  profiles_ch: []
  profiles_lm: []

# WHY top-level: GH 9.1 "server:" must NOT be nested under "graphhopper:".
# WHY bind_host (snake_case): GH 9.1 uses snake_case; bindHost fails silently.
server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 0.0.0.0
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 127.0.0.1

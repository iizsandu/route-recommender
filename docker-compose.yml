services:
  graphhopper:
    build:
      context: ./graphhopper
      dockerfile: Dockerfile
    ports:
      - "8989:8989"
    volumes:
      # PBF and edge-risk data are read-only from the container's perspective.
      - ./graphhopper/data/delhi-ncr-latest.osm.pbf:/data/delhi-ncr-latest.osm.pbf:ro
      - ./ml/artifacts/edge_risk.json:/data/edge_risk.json:ro
      # gh_edges.csv is writable so EdgeExporter can write into it from the container.
      - ./ml/artifacts/gh_edges.csv:/data/gh_edges.csv
      # Named volume keeps the compiled binary graph across restarts (3-5 min to rebuild).
      - graphhopper_graph:/graphhopper/graph-cache
    environment:
      - JAVA_OPTS=-Xmx3g -Xms512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 15s
      timeout: 5s
      # WHY start_period=600s: graph preprocessing takes up to 10 min on first run.
      # Health checks only start counting retries after this window.
      start_period: 600s
      retries: 40
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      # WHY: persist the index on disk so a container restart doesn't wipe the built index
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    # WHY: env_file injects all .env vars into the container at runtime,
    # keeping secrets out of the image layers
    env_file:
      - .env
    volumes:
      # WHY: mount live source over the baked-in copy so edits to backend/app/**
      # are visible inside the container immediately, without rebuilding the image.
      # Mirrors how the frontend already uses a volume mount for Vite HMR.
      # Only app/ is mounted — installed packages and ML artifacts in the image are unaffected.
      - ./backend/app:/repo/backend/app
    # WHY --reload: uvicorn watches /repo/backend/app for file changes and restarts
    # automatically. Without this, the volume mount updates files but the running
    # process never re-imports them.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /repo/backend/app
    depends_on:
      qdrant:
        condition: service_started
      # WHY service_healthy: backend must not start while GH is still preprocessing
      # (that 5-10 min window). The backend would flood logs with 503 errors otherwise.
      graphhopper:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    # WHY: use the node image directly in dev so Vite HMR works over the volume mount
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # WHY: anonymous volume shadows the host's node_modules so the container
      # uses its own platform-correct binaries, not whatever's on the Windows host
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host --port 3000"
    environment:
      # WHY: baked at runtime for dev; in production this is set in Vercel env vars
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  # WHY named volume: prevents GH reprocessing the Delhi graph (3-5 min) on every restart.
  # Delete with: docker volume rm route_recommender_web_graphhopper_graph
  # Required when: PBF replaced, config.yml profile names changed, Java weighting changed.
  graphhopper_graph:
    driver: local

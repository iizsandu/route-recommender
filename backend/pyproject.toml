[tool.pytest.ini_options]
testpaths = ["tests"]
# WHY pythonpath: adds backend/ to sys.path so `import app.*` works without
# setting PYTHONPATH manually in CI or locally.
pythonpath = ["."]
asyncio_mode = "auto"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]

[tool.ruff.lint.per-file-ignores]
# WHY: assert is an anti-pattern in prod code but idiomatic in tests
"tests/*" = ["S101"]

[tool.black]
line-length = 88
target-version = ["py311"]
# WHY: black is the canonical formatter; ruff handles linting only.
# Keeping both avoids editor/CI disagreements on format output.

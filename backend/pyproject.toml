[tool.pytest.ini_options]
testpaths = ["tests"]
# WHY pythonpath: adds backend/ to sys.path so `import app.*` works without
# setting PYTHONPATH manually in CI or locally.
pythonpath = ["."]
asyncio_mode = "auto"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]
ignore = [
    "E402",   # module-level import not at top — needed after sys.path.insert in risk_model.py
    "N806",   # variable in function should be lowercase — X is idiomatic for feature matrices
]

[tool.ruff.lint.per-file-ignores]
# WHY: assert is an anti-pattern in prod code but idiomatic in tests
"tests/*" = ["S101"]

[tool.black]
line-length = 120
target-version = ["py311"]
# WHY: black is the canonical formatter; ruff handles linting only.
# Keeping both avoids editor/CI disagreements on format output.

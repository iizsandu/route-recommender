[tool.pytest.ini_options]
testpaths = ["tests"]
# WHY: asyncio_mode=auto means pytest-asyncio handles async test functions
# without needing @pytest.mark.asyncio on every test
asyncio_mode = "auto"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]

[tool.ruff.lint.per-file-ignores]
# WHY: assert is an anti-pattern in prod code but idiomatic in tests
"tests/*" = ["S101"]

[tool.black]
line-length = 88
target-version = ["py311"]
# WHY: black is the canonical formatter; ruff handles linting only.
# Keeping both avoids editor/CI disagreements on format output.
